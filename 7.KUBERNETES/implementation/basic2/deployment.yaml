apiVersion: apps/v1
kind: Deployment
metadata:
  name: welcome-deployment
  labels:
    app: welcome
spec:
  replicas: 2
  selector:
    matchLabels:
      app: welcome
  template: # template is used to recreate the pod if any replica ports are demaged 
    metadata:
      labels:
        app: welcome
    spec:
      containers:
        - name: welcome-container
          image: kicbase/echo-server:1.0
          ports:
            - containerPort: 8080